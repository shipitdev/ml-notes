<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180" width="100%" height="100%">
  <rect width="650" height="180" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Arithmetic Mean vs. Harmonic Mean (F1 Score)</text>
  
  <!-- Scenario Box -->
  <rect x="25" y="45" width="190" height="115" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="120" y="70" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Imbalanced Classifier</text>
  <text x="120" y="95" text-anchor="middle" font-size="12" fill="#2563EB" font-weight="bold">Precision = 100%</text>
  <text x="120" y="120" text-anchor="middle" font-size="12" fill="#EF4444" font-weight="bold">Recall = 1%</text>
  
  <!-- Arithmetic Mean Scales -->
  <g transform="translate(240, 45)">
    <rect width="180" height="115" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#D97706">Arithmetic Mean</text>
    <text x="90" y="55" text-anchor="middle" font-size="10" font-family="Courier New, monospace" font-weight="bold">(P + R) / 2</text>
    <text x="90" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97706">50.5%</text>
    <text x="90" y="100" text-anchor="middle" font-size="9" fill="#B45309">Misleadingly high average</text>
  </g>
  
  <!-- Harmonic Mean (F1) Scales -->
  <g transform="translate(435, 45)">
    <rect width="190" height="115" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="95" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#4F46E5">Harmonic Mean (F1)</text>
    <text x="95" y="55" text-anchor="middle" font-size="10" font-family="Courier New, monospace" font-weight="bold">2PR / (P + R)</text>
    <text x="95" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#4F46E5">1.98%</text>
    <text x="95" y="100" text-anchor="middle" font-size="9" fill="#4338CA">Bottlenecks at the lowest score</text>
  </g>
</svg>