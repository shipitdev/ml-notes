<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#9CA3AF" />
    </marker>
  </defs>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Deviance Drop &amp; Significance Testing</text>
  
  <!-- Left Side: Null -->
  <rect x="50" y="55" width="150" height="50" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="125" y="77" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#B45309">Null Deviance</text>
  <text x="125" y="93" text-anchor="middle" font-size="9" fill="#B45309">(Baseline/Intercept error)</text>
  
  <!-- Right Side: Residual -->
  <rect x="450" y="55" width="150" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="525" y="77" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#1D4ED8">Residual Deviance</text>
  <text x="525" y="93" text-anchor="middle" font-size="9" fill="#1D4ED8">(Fitted predictor error)</text>
  
  <!-- Center Comparison -->
  <rect x="235" y="115" width="180" height="60" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="325" y="132" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Difference (Deviance Drop)</text>
  <text x="325" y="147" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Tested via Chi-squared</text>
  <text x="325" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#4F46E5">Predictor Significance</text>
  
  <!-- Lines -->
  <path d="M 125 110 L 125 145 L 225 145" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 525 110 L 525 145 L 425 145" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>