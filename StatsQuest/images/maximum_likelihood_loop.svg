<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#9CA3AF" />
    </marker>
  </defs>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Maximum Likelihood Fitting Loop</text>
  
  <!-- Loop states -->
  <rect x="25" y="65" width="110" height="45" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="80" y="90" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Candidate Line</text>
  
  <rect x="175" y="65" width="125" height="45" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="237.5" y="90" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Compute Probabilities</text>
  
  <rect x="340" y="65" width="125" height="45" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="402.5" y="90" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Sum Log-Likelihoods</text>
  
  <!-- Decision -->
  <rect x="505" y="65" width="120" height="45" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="565" y="85" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Maximized?</text>
  <text x="565" y="98" text-anchor="middle" font-size="8" fill="#047857">(Optimized fit)</text>
  
  <!-- Lines -->
  <path d="M 135 87.5 L 170 87.5" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 300 87.5 L 335 87.5" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 465 87.5 L 500 87.5" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Feedback loop -->
  <path d="M 565 110 L 565 145 L 80 145 L 80 115" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <text x="325" y="140" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">No: Adjust slope / intercept using gradient ascent</text>
</svg>