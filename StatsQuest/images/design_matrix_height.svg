<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <rect width="400" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  
  <text x="200" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" font-weight="bold">Design Matrix (X): Predicting Weight from Height</text>
  
  <!-- Column Labels -->
  <text x="170" y="55" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#4F46E5">Intercept (1s)</text>
  <text x="260" y="55" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#2563EB">Height (in)</text>
  
  <!-- Brackets -->
  <path d="M 125 70 L 110 70 L 110 170 L 125 170" fill="none" stroke="#4B5563" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 305 70 L 320 70 L 320 170 L 305 170" fill="none" stroke="#4B5563" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Elements -->
  <!-- Row 1 -->
  <text x="170" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">1</text>
  <text x="260" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">60</text>
  
  <!-- Row 2 -->
  <text x="170" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">1</text>
  <text x="260" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">65</text>
  
  <!-- Row 3 -->
  <text x="170" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">1</text>
  <text x="260" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F2937">70</text>
</svg>