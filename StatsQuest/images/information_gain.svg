<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#9CA3AF" />
    </marker>
  </defs>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Information Gain (Mutual Information Split)</text>
  
  <!-- Parent Node -->
  <rect x="250" y="45" width="150" height="35" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="325" y="66" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Parent: Mixed (H = 1.00)</text>
  
  <!-- Split branches -->
  <path d="M 325 80 L 195 125" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 325 80 L 455 125" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="100" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Feature Split = Yes</text>
  <text x="370" y="100" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Feature Split = No</text>
  
  <!-- Child Nodes -->
  <rect x="120" y="130" width="140" height="35" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="190" y="152" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Child 1: Pure (H = 0.54)</text>
  
  <rect x="390" y="130" width="140" height="35" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="460" y="152" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Child 2: Pure (H = 0.00)</text>
  
  <!-- Calculation details -->
  <rect x="15" y="45" width="180" height="60" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1"/>
  <text x="105" y="65" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Uncertainty Reduced</text>
  <text x="105" y="80" text-anchor="middle" font-size="8" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">H_parent - Weighted_H_children</text>
  <text x="105" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#4F46E5">Info Gain = 0.73 bits</text>
</svg>