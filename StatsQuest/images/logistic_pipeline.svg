<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180" width="100%" height="100%">
  <rect width="650" height="180" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#9CA3AF" />
    </marker>
  </defs>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">The Logistic Regression Prediction Pipeline</text>
  
  <!-- Step 1 -->
  <rect x="25" y="55" width="115" height="50" rx="6" fill="#F3F4F6" stroke="#4B5563" stroke-width="1.5"/>
  <text x="82.5" y="78" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">1. Predictor X</text>
  <text x="82.5" y="93" text-anchor="middle" font-size="8" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">(Continuous/Dummy)</text>
  
  <!-- Step 2 -->
  <rect x="180" y="55" width="115" height="50" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="237.5" y="75" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">2. Linear Equation</text>
  <text x="237.5" y="90" text-anchor="middle" font-size="9" font-family="Courier New, monospace" font-weight="bold" fill="#D97706">z = β0 + β1*X</text>
  
  <!-- Step 3 -->
  <rect x="335" y="55" width="125" height="50" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="397.5" y="75" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">3. Sigmoid Function</text>
  <text x="397.5" y="90" text-anchor="middle" font-size="9" font-family="Courier New, monospace" font-weight="bold" fill="#4F46E5">p = e^z / (1 + e^z)</text>
  
  <!-- Step 4 -->
  <rect x="500" y="55" width="125" height="50" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="562.5" y="75" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">4. Classification</text>
  <text x="562.5" y="90" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563" fill="#047857">Label = 1 if p &gt;= 0.5</text>
  
  <!-- Connections -->
  <path d="M 140 80 L 175 80" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 295 80 L 330 80" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 460 80 L 495 80" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
</svg>