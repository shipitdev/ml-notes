<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220" width="100%" height="100%">
  <rect width="650" height="220" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Linear vs. Logistic Regression for Binary Classes</text>
  
  <!-- Left Panel: Linear -->
  <g transform="translate(15, 45)">
    <rect width="295" height="155" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="147" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Linear Regression (Fit line)</text>
    <!-- Axes -->
    <line x1="40" y1="120" x2="260" y2="120" stroke="#9CA3AF" stroke-width="1"/>
    <!-- Line -->
    <line x1="50" y1="140" x2="250" y2="50" stroke="#EF4444" stroke-width="2"/>
    <circle cx="60" cy="120" r="3" fill="#3B82F6"/>
    <circle cx="100" cy="120" r="3" fill="#3B82F6"/>
    <circle cx="200" cy="60" r="3" fill="#3B82F6"/>
    <circle cx="240" cy="60" r="3" fill="#3B82F6"/>
    <text x="147" y="145" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">Line goes &lt; 0 and &gt; 1</text>
  </g>
  
  <!-- Right Panel: Logistic -->
  <g transform="translate(340, 45)">
    <rect width="295" height="155" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="147" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Logistic Regression (S-curve)</text>
    <!-- Axes -->
    <line x1="40" y1="120" x2="260" y2="120" stroke="#9CA3AF" stroke-width="1"/>
    <!-- Curve -->
    <path d="M 50 120 C 130 120 130 60 250 60" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <circle cx="60" cy="120" r="3" fill="#3B82F6"/>
    <circle cx="100" cy="120" r="3" fill="#3B82F6"/>
    <circle cx="200" cy="60" r="3" fill="#3B82F6"/>
    <circle cx="240" cy="60" r="3" fill="#3B82F6"/>
    <text x="147" y="145" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Sigmoid curve bounded in [0, 1]</text>
  </g>
</svg>