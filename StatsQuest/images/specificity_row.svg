<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Specificity Focus (Actual Negative Row)</text>
  
  <!-- Column Headers -->
  <text x="310" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Predicted: positive</text>
  <text x="470" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Predicted: negative</text>
  
  <!-- Row Headers -->
  <text x="210" y="95" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Actual: positive</text>
  <text x="210" y="155" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Actual: negative</text>
  
  <!-- Grid Matrix (Highlighted actual negative row) -->
  <rect x="220" y="125" width="340" height="60" rx="8" fill="none" stroke="#D97706" stroke-width="3" stroke-dasharray="1"/>
  
  <rect x="230" y="70" width="150" height="50" rx="4" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="305" y="160" text-anchor="middle" font-size="12" fill="#9CA3AF">TP = 40</text>
  
  <rect x="400" y="70" width="150" height="50" rx="4" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="475" y="160" text-anchor="middle" font-size="12" fill="#9CA3AF">FN = 10</text>
  
  <rect x="230" y="130" width="150" height="50" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="305" y="160" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">FP = 5</text>
  
  <rect x="400" y="130" width="150" height="50" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="475" y="160" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">TN = 45</text>
  
  <!-- Formula -->
  <rect x="15" y="65" width="180" height="115" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1"/>
  <text x="105" y="90" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Specificity (TNR)</text>
  <text x="105" y="115" text-anchor="middle" font-size="10" font-family="Courier New, monospace" font-weight="bold">TNR = TN / (TN+FP)</text>
  <text x="105" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#4F46E5">45 / (45+5) = 90%</text>
</svg>