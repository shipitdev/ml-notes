<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Information Overlap: Mutual Information</text>
  
  <!-- Left Circle: H(X) -->
  <circle cx="270" cy="110" r="60" fill="#3B82F6" fill-opacity="0.25" stroke="#2563EB" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#1D4ED8">H(X)</text>
  <text x="230" y="125" text-anchor="middle" font-size="8" fill="#1D4ED8">Predictor Entropy</text>
  
  <!-- Right Circle: H(Y) -->
  <circle cx="380" cy="110" r="60" fill="#F59E0B" fill-opacity="0.25" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="110" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#B45309">H(Y)</text>
  <text x="420" y="125" text-anchor="middle" font-size="8" fill="#B45309">Target Entropy</text>
  
  <!-- Overlap Intersection: I(X;Y) -->
  <text x="325" y="105" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#4F46E5">I(X; Y)</text>
  <text x="325" y="120" text-anchor="middle" font-size="8" fill="#4338CA" font-weight="bold">Mutual Info</text>
  <text x="325" y="132" text-anchor="middle" font-size="8" fill="#4338CA">(Overlap)</text>
  
  <!-- Surrounding Labels -->
  <text x="175" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">H(X|Y) Leftover X</text>
  <text x="475" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">H(Y|X) Leftover Y (Error)</text>
  <text x="325" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Union: Joint Entropy H(X, Y)</text>
</svg>