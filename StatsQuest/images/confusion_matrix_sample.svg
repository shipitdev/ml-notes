<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <rect width="500" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  
  <text x="250" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" font-weight="bold">Sample Confusion Matrix (Disease Diagnosis)</text>
  
  <!-- Column Headers -->
  <text x="220" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Predicted: YES</text>
  <text x="380" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Predicted: NO</text>
  
  <!-- Row Headers -->
  <text x="130" y="95" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Actual: YES</text>
  <text x="130" y="155" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Actual: NO</text>
  
  <!-- Cells -->
  <!-- TP -->
  <rect x="150" y="70" width="140" height="50" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">TP = 90</text>
  <text x="220" y="110" text-anchor="middle" font-size="8" fill="#047857">Correct sick hit</text>
  
  <!-- FN -->
  <rect x="310" y="70" width="140" height="50" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="380" y="95" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">FN = 10</text>
  <text x="380" y="110" text-anchor="middle" font-size="8" fill="#B91C1C">Missed cases</text>
  
  <!-- FP -->
  <rect x="150" y="130" width="140" height="50" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="220" y="155" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">FP = 15</text>
  <text x="220" y="170" text-anchor="middle" font-size="8" fill="#B91C1C">False alarms</text>
  
  <!-- TN -->
  <rect x="310" y="130" width="140" height="50" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="380" y="155" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">TN = 985</text>
  <text x="380" y="170" text-anchor="middle" font-size="8" fill="#047857">Correctly cleared</text>
</svg>