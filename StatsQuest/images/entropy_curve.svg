<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">The Binary Entropy Curve</text>
  
  <!-- Axes -->
  <line x1="150" y1="160" x2="500" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="150" y1="50" x2="150" y2="160" stroke="#4B5563" stroke-width="2"/>
  <text x="325" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Probability of Category A (p)</text>
  <text x="115" y="105" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" transform="rotate(-90 115 105)">Entropy (H)</text>
  
  <!-- Axis Ticks -->
  <text x="150" y="172" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">0.0</text>
  <text x="325" y="172" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">0.5</text>
  <text x="500" y="172" text-anchor="end" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">1.0</text>
  <text x="140" y="163" text-anchor="end" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">0.0</text>
  <text x="140" y="60" text-anchor="end" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">1.0</text>
  
  <!-- The Curve (Parabola) -->
  <path d="M 150 160 Q 325 50 500 160" fill="none" stroke="#4F46E5" stroke-width="3"/>
  
  <!-- Highlights -->
  <circle cx="325" cy="55" r="4" fill="#EF4444"/>
  <line x1="325" y1="55" x2="325" y2="160" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3"/>
  <text x="335" y="55" font-size="9" fill="#EF4444" font-weight="bold">Peak (H=1.0 at p=0.5)</text>
  
  <text x="170" y="150" font-size="9" fill="#10B981" font-weight="bold">H=0 (Pure class B)</text>
  <text x="480" y="150" text-anchor="end" font-size="9" fill="#10B981" font-weight="bold">H=0 (Pure class A)</text>
</svg>