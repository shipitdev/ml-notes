<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180" width="100%" height="100%">
  <rect width="650" height="180" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Visualising Entropy (Impurity)</text>
  
  <!-- Bins -->
  <!-- Bin 1: Pure -->
  <g transform="translate(40, 45)">
    <rect width="160" height="90" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="60" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="90" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="130" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="45" cy="60" r="10" fill="#3B82F6"/>
    <circle cx="105" cy="60" r="10" fill="#3B82F6"/>
    <text x="80" y="155" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Entropy = 0</text>
    <text x="80" y="170" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Totally Pure (Predictable)</text>
  </g>
  
  <!-- Bin 2: Low Entropy -->
  <g transform="translate(245, 45)">
    <rect width="160" height="90" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="60" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="90" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="130" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="45" cy="60" r="10" fill="#3B82F6"/>
    <circle cx="105" cy="60" r="10" fill="#EF4444"/>
    <text x="80" y="155" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Entropy = 0.54</text>
    <text x="80" y="170" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="bold">Impure (Mostly Blue)</text>
  </g>
  
  <!-- Bin 3: High Entropy -->
  <g transform="translate(450, 45)">
    <rect width="160" height="90" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="60" cy="30" r="10" fill="#EF4444"/>
    <circle cx="90" cy="30" r="10" fill="#3B82F6"/>
    <circle cx="130" cy="30" r="10" fill="#EF4444"/>
    <circle cx="45" cy="60" r="10" fill="#EF4444"/>
    <circle cx="105" cy="60" r="10" fill="#3B82F6"/>
    <text x="80" y="155" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Entropy = 1.0</text>
    <text x="80" y="170" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">Maximally Jumbled (50/50)</text>
  </g>
</svg>