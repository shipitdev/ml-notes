<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <rect width="650" height="250" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="30" text-anchor="middle" font-size="16" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Machine Learning Taxonomy</text>
  
  <!-- Main Root -->
  <rect x="250" y="55" width="150" height="35" rx="6" fill="#F3F4F6" stroke="#4B5563" stroke-width="2"/>
  <text x="325" y="77" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Machine Learning</text>
  
  <!-- Branches -->
  <rect x="75" y="115" width="180" height="35" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="165" y="137" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Supervised (Data + Labels)</text>
  
  <rect x="395" y="115" width="180" height="35" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="485" y="137" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Unsupervised (Data Only)</text>
  
  <!-- Leaves Supervised -->
  <rect x="25" y="180" width="130" height="40" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="90" y="198" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Classification</text>
  <text x="90" y="212" text-anchor="middle" font-size="9" fill="#047857">Predict Categories (Spam/Not)</text>
  
  <rect x="180" y="180" width="130" height="40" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="245" y="198" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Regression</text>
  <text x="245" y="212" text-anchor="middle" font-size="9" fill="#047857">Predict Numbers (Price)</text>
  
  <!-- Leaves Unsupervised -->
  <rect x="340" y="180" width="130" height="40" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="405" y="198" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Clustering</text>
  <text x="405" y="212" text-anchor="middle" font-size="9" fill="#1D4ED8">Group Customers</text>
  
  <rect x="495" y="180" width="130" height="40" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="560" y="198" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Dimensionality Reduction</text>
  <text x="560" y="212" text-anchor="middle" font-size="9" fill="#1D4ED8">PCA / Feature Compress</text>
  
  <!-- Lines -->
  <path d="M 325 90 L 165 115" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <path d="M 325 90 L 485 115" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <path d="M 165 150 L 90 180" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <path d="M 165 150 L 245 180" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <path d="M 485 150 L 405 180" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <path d="M 485 150 L 560 180" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
</svg>