<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">The t-test Reframed as a 0/1 Regression</text>
  
  <!-- Axes -->
  <line x1="180" y1="160" x2="470" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="180" y1="40" x2="180" y2="160" stroke="#4B5563" stroke-width="2"/>
  <text x="325" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Dummy Coding Group (X)</text>
  <text x="135" y="100" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" transform="rotate(-90 135 100)">Weight (Y)</text>
  
  <!-- Ticks -->
  <line x1="240" y1="160" x2="240" y2="165" stroke="#4B5563" stroke-width="1.5"/>
  <text x="240" y="178" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">x = 0</text>
  <text x="240" y="192" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Group A (Control)</text>
  
  <line x1="410" y1="160" x2="410" y2="165" stroke="#4B5563" stroke-width="1.5"/>
  <text x="410" y="178" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">x = 1</text>
  <text x="410" y="192" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Group B (Treatment)</text>
  
  <!-- Regression line connecting averages -->
  <line x1="240" y1="120" x2="410" y2="70" stroke="#2563EB" stroke-width="3"/>
  
  <!-- Means -->
  <circle cx="240" cy="120" r="5" fill="#EF4444"/>
  <text x="230" y="115" text-anchor="end" font-size="10" fill="#EF4444" font-weight="bold">Mean A (Intercept)</text>
  
  <circle cx="410" cy="70" r="5" fill="#10B981"/>
  <text x="420" y="65" font-size="10" fill="#065F46" font-weight="bold">Mean B</text>
  
  <!-- Slope -->
  <path d="M 240 120 L 410 120 L 410 75" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="325" y="135" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Slope = Mean B - Mean A</text>
</svg>