<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Visualising Linear Regression Residuals</text>
  
  <!-- Axes -->
  <line x1="80" y1="160" x2="570" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="80" y1="40" x2="80" y2="160" stroke="#4B5563" stroke-width="2"/>
  <text x="325" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Height (Predictor X)</text>
  <text x="45" y="100" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" transform="rotate(-90 45 100)">Weight (Y)</text>
  
  <!-- Fit line -->
  <line x1="100" y1="140" x2="540" y2="60" stroke="#2563EB" stroke-width="3"/>
  <text x="450" y="55" font-size="10" fill="#2563EB" font-weight="bold">Line of Best Fit</text>
  
  <!-- Data points and residuals (vertical offsets) -->
  <!-- Pt 1 -->
  <line x1="180" y1="90" x2="180" y2="125" stroke="#EF4444" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="180" cy="90" r="5" fill="#3B82F6"/>
  
  <!-- Pt 2 -->
  <line x1="280" y1="140" x2="280" y2="108" stroke="#EF4444" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="280" cy="140" r="5" fill="#3B82F6"/>
  
  <!-- Pt 3 -->
  <line x1="380" y1="60" x2="380" y2="90" stroke="#EF4444" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="380" cy="60" r="5" fill="#3B82F6"/>
  
  <!-- Pt 4 -->
  <line x1="480" y1="110" x2="480" y2="72" stroke="#EF4444" stroke-width="2" stroke-dasharray="3"/>
  <circle cx="480" cy="110" r="5" fill="#3B82F6"/>
  
  <text x="395" y="75" font-size="10" fill="#EF4444" font-weight="bold">Residual (vertical error)</text>
</svg>