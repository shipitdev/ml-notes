<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">How Coefficients Map to the Sigmoid Curve</text>
  
  <!-- Axis -->
  <line x1="200" y1="160" x2="520" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="200" y1="50" x2="200" y2="160" stroke="#4B5563" stroke-width="2"/>
  <text x="360" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Predictor X</text>
  <text x="155" y="105" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" transform="rotate(-90 155 105)">Probability (p)</text>
  
  <!-- Sigmoid Curve -->
  <path d="M 210 150 C 320 150 320 60 510 60" fill="none" stroke="#4F46E5" stroke-width="3"/>
  
  <!-- Intercept (Y-intercept at X=0) -->
  <line x1="200" y1="105" x2="318" y2="105" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="200" cy="105" r="5" fill="#F59E0B"/>
  <text x="210" y="100" font-size="9" fill="#D97706" font-weight="bold">Intercept: sets baseline height</text>
  
  <!-- Slope Coefficient (speed of transition) -->
  <path d="M 310 115 L 340 100" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="100" font-size="9" fill="#EF4444" font-weight="bold">Slope: controls curve steepness</text>
</svg>