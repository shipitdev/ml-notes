<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">R² vs. Adjusted R² with Junk Variables</text>
  
  <!-- Table Container -->
  <rect x="25" y="45" width="600" height="135" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  
  <!-- Grid Headers -->
  <rect x="25" y="45" width="600" height="30" rx="8" fill="#F3F4F6"/>
  <text x="40" y="65" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Model Configuration</text>
  <text x="300" y="65" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Plain R²</text>
  <text x="420" y="65" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Adjusted R²</text>
  <text x="530" y="65" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Interpretation</text>
  
  <!-- Row 1 -->
  <text x="40" y="95" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">1. [Size]</text>
  <text x="300" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B82F6">0.75</text>
  <text x="420" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">0.74</text>
  <text x="530" y="95" font-size="9" fill="#10B981" font-weight="bold">Good Baseline</text>
  <line x1="25" y1="105" x2="625" y2="105" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Row 2 -->
  <text x="40" y="125" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">2. [Size + Bedrooms]</text>
  <text x="300" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B82F6">0.79</text>
  <text x="420" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">0.77</text>
  <text x="530" y="125" font-size="9" fill="#10B981" font-weight="bold">Useful feature (Both rise)</text>
  <line x1="25" y1="135" x2="625" y2="135" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Row 3 -->
  <text x="40" y="155" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563" fill="#EF4444">3. [Size + Beds + Coin Flips]</text>
  <text x="300" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B82F6">0.80 \u25B2</text>
  <text x="420" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">0.75 \u25BC</text>
  <text x="530" y="155" font-size="9" fill="#EF4444" font-weight="bold">Junk variable penalised!</text>
</svg>