<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Finding Least Squares: SSR Bowl Curve</text>
  
  <!-- Axes -->
  <line x1="180" y1="160" x2="470" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="180" y1="40" x2="180" y2="160" stroke="#4B5563" stroke-width="2"/>
  <text x="325" y="185" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Slope (or Intercept)</text>
  <text x="135" y="100" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" transform="rotate(-90 135 100)">SSR (Error)</text>
  
  <!-- Parabola -->
  <path d="M 210 50 Q 325 210 440 50" fill="none" stroke="#4F46E5" stroke-width="3"/>
  
  <!-- Least squares point -->
  <circle cx="325" cy="130" r="6" fill="#10B981"/>
  <line x1="325" y1="130" x2="325" y2="160" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="335" y="130" font-size="10" fill="#065F46" font-weight="bold">Least Squares Point (Minimum SSR)</text>
  
  <text x="450" y="70" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Try different lines (slopes),</text>
  <text x="450" y="85" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">calculate SSR. Bottom of bowl</text>
  <text x="450" y="100" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">gives the best fit instantly.</text>
</svg>