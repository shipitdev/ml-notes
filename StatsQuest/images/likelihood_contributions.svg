<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Maximum Likelihood Point Contributions</text>
  
  <!-- Axis -->
  <line x1="200" y1="160" x2="520" y2="160" stroke="#4B5563" stroke-width="2"/>
  <line x1="200" y1="40" x2="200" y2="160" stroke="#4B5563" stroke-width="2"/>
  
  <!-- Sigmoid Curve -->
  <path d="M 210 150 C 320 150 320 60 510 60" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="2"/>
  
  <!-- Point 1 (Actual = 1) -->
  <line x1="420" y1="160" x2="420" y2="76" stroke="#10B981" stroke-width="2"/>
  <circle cx="420" cy="60" r="5" fill="#10B981"/>
  <text x="428" y="70" font-size="9" fill="#065F46" font-weight="bold">Actual=1 (Contribution = p_i)</text>
  
  <!-- Point 2 (Actual = 0) -->
  <line x1="280" y1="160" x2="280" y2="136" stroke="#EF4444" stroke-width="2"/>
  <circle cx="280" cy="160" r="5" fill="#EF4444"/>
  <text x="288" y="145" font-size="9" fill="#B91C1C" font-weight="bold">Actual=0 (Contribution = 1 - p_j)</text>
</svg>