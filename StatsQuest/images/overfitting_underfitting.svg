<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Underfitting Panel -->
  <g transform="translate(10, 10)">
    <rect width="195" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="97" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Underfitting (High Bias)</text>
    <path d="M 20 150 L 180 50" stroke="#EF4444" stroke-width="2.5" fill="none"/>
    <circle cx="40" cy="130" r="4" fill="#3B82F6"/>
    <circle cx="70" cy="90" r="4" fill="#3B82F6"/>
    <circle cx="100" cy="110" r="4" fill="#3B82F6"/>
    <circle cx="130" cy="70" r="4" fill="#3B82F6"/>
    <circle cx="160" cy="100" r="4" fill="#3B82F6"/>
    <text x="97" y="170" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">Too simple. Misses trend.</text>
  </g>
  
  <!-- Balanced Panel -->
  <g transform="translate(225, 10)">
    <rect width="195" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="97" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Good Fit (Balanced)</text>
    <path d="M 20 140 Q 70 80 100 110 T 180 80" stroke="#10B981" stroke-width="2.5" fill="none"/>
    <circle cx="40" cy="130" r="4" fill="#3B82F6"/>
    <circle cx="70" cy="90" r="4" fill="#3B82F6"/>
    <circle cx="100" cy="110" r="4" fill="#3B82F6"/>
    <circle cx="130" cy="70" r="4" fill="#3B82F6"/>
    <circle cx="160" cy="100" r="4" fill="#3B82F6"/>
    <text x="97" y="170" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Generalises well.</text>
  </g>
  
  <!-- Overfitting Panel -->
  <g transform="translate(440, 10)">
    <rect width="195" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="97" y="25" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Overfitting (High Variance)</text>
    <path d="M 20 150 L 40 130 L 70 90 L 100 110 L 130 70 L 160 100 L 180 80" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <circle cx="40" cy="130" r="4" fill="#3B82F6"/>
    <circle cx="70" cy="90" r="4" fill="#3B82F6"/>
    <circle cx="100" cy="110" r="4" fill="#3B82F6"/>
    <circle cx="130" cy="70" r="4" fill="#3B82F6"/>
    <circle cx="160" cy="100" r="4" fill="#3B82F6"/>
    <text x="97" y="170" text-anchor="middle" font-size="9" fill="#D97706" font-weight="bold">Chases noise. Memorises data.</text>
  </g>
</svg>