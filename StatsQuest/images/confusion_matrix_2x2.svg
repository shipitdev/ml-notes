<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <rect width="650" height="250" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Matrix Title -->
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">The 2×2 Confusion Matrix</text>
  
  <!-- Top Headers -->
  <text x="310" y="55" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Predicted: positive</text>
  <text x="470" y="55" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Predicted: negative</text>
  
  <!-- Left Headers -->
  <text x="210" y="110" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Actual: positive</text>
  <text x="210" y="180" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Actual: negative</text>
  
  <!-- Quadrant Cells -->
  <!-- TP -->
  <rect x="230" y="70" width="160" height="70" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="310" y="95" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">True Positive (TP)</text>
  <text x="310" y="115" text-anchor="middle" font-size="10" fill="#047857">Actual: Yes | Predicted: Yes</text>
  <text x="310" y="130" text-anchor="middle" font-size="9" fill="#065F46">Correct hit ✅</text>
  
  <!-- FN -->
  <rect x="400" y="70" width="160" height="70" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="480" y="95" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">False Negative (FN)</text>
  <text x="480" y="115" text-anchor="middle" font-size="10" fill="#B91C1C">Actual: Yes | Predicted: No</text>
  <text x="480" y="130" text-anchor="middle" font-size="9" fill="#991B1B">Missed case ❌</text>
  
  <!-- FP -->
  <rect x="230" y="150" width="160" height="70" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="310" y="175" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">False Positive (FP)</text>
  <text x="310" y="195" text-anchor="middle" font-size="10" fill="#B91C1C">Actual: No | Predicted: Yes</text>
  <text x="310" y="210" text-anchor="middle" font-size="9" fill="#991B1B">False Alarm ❌</text>
  
  <!-- TN -->
  <rect x="400" y="150" width="160" height="70" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="480" y="175" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">True Negative (TN)</text>
  <text x="480" y="195" text-anchor="middle" font-size="10" fill="#047857">Actual: No | Predicted: No</text>
  <text x="480" y="210" text-anchor="middle" font-size="9" fill="#065F46">Correct Rejection ✅</text>
  
  <!-- Core Math -->
  <text x="10" y="85" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Key Equations:</text>
  <rect x="10" y="95" width="180" height="125" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1"/>
  <text x="20" y="120" font-size="10" font-family="Courier New, monospace" font-weight="bold">Accuracy = (TP+TN)/Total</text>
  <text x="20" y="145" font-size="10" font-family="Courier New, monospace" font-weight="bold">Sensitivity = TP/(TP+FN)</text>
  <text x="20" y="170" font-size="10" font-family="Courier New, monospace" font-weight="bold">Specificity = TN/(TN+FP)</text>
  <text x="20" y="195" font-size="10" font-family="Courier New, monospace" font-weight="bold">Precision = TP/(TP+FP)</text>
</svg>