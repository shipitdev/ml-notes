<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180" width="100%" height="100%">
  <rect width="650" height="180" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#9CA3AF" />
    </marker>
  </defs>
  <text x="325" y="30" text-anchor="middle" font-size="16" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">The Machine Learning Workflow</text>
  
  <!-- Boxes -->
  <rect x="25" y="70" width="110" height="50" rx="8" fill="#EEF2F6" stroke="#94A3B8" stroke-width="2"/>
  <text x="80" y="100" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Historical Data</text>
  
  <rect x="180" y="50" width="100" height="40" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="230" y="75" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Training Set (80%)</text>
  
  <rect x="180" y="110" width="100" height="40" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Test Set (20%)</text>
  
  <rect x="330" y="50" width="100" height="40" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="380" y="75" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Model Training</text>
  
  <rect x="475" y="50" width="150" height="45" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="550" y="70" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Evaluate Predictions</text>
  <text x="550" y="85" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Compare to Test Set</text>
  
  <!-- Connectors -->
  <path d="M 135 95 L 170 70" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 135 95 L 170 130" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 280 70 L 320 70" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 430 70 L 465 70" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 280 130 L 410 130 L 465 95" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
</svg>