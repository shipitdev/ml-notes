<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Precision Focus (Predicted Positive Column)</text>
  
  <!-- Column Headers -->
  <text x="310" y="55" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#2563EB">Predicted: positive</text>
  <text x="470" y="55" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Predicted: negative</text>
  
  <!-- Row Headers -->
  <text x="210" y="95" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Actual: positive</text>
  <text x="210" y="155" text-anchor="end" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Actual: negative</text>
  
  <!-- Grid Matrix (Highlighted predicted positive column) -->
  <rect x="225" y="65" width="160" height="120" rx="8" fill="none" stroke="#2563EB" stroke-width="3" stroke-dasharray="1"/>
  
  <rect x="230" y="70" width="150" height="50" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="305" y="100" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">TP = 100</text>
  
  <rect x="400" y="70" width="150" height="50" rx="4" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="475" y="100" text-anchor="middle" font-size="12" fill="#9CA3AF">FN = 25</text>
  
  <rect x="230" y="130" width="150" height="50" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="305" y="160" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">FP = 10</text>
  
  <rect x="400" y="130" width="150" height="50" rx="4" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="475" y="160" text-anchor="middle" font-size="12" fill="#9CA3AF">TN = 865</text>
  
  <!-- Formula -->
  <rect x="15" y="65" width="180" height="115" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1"/>
  <text x="105" y="90" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Precision (PPV)</text>
  <text x="105" y="115" text-anchor="middle" font-size="10" font-family="Courier New, monospace" font-weight="bold">PPV = TP / (TP+FP)</text>
  <text x="105" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#4F46E5">100 / (100+10) = 90.9%</text>
</svg>