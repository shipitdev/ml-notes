<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <rect width="650" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937">Log-Likelihoods for McFadden's Pseudo R²</text>
  
  <!-- Scale bar -->
  <line x1="80" y1="100" x2="570" y2="100" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Ticks -->
  <!-- Overall -->
  <circle cx="150" cy="100" r="7" fill="#EF4444"/>
  <line x1="150" y1="100" x2="150" y2="140" stroke="#EF4444" stroke-width="1.5"/>
  <text x="150" y="155" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#EF4444">LL(overall prob)</text>
  <text x="150" y="170" text-anchor="middle" font-size="8" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Worst baseline</text>
  
  <!-- Fitted -->
  <circle cx="380" cy="100" r="7" fill="#3B82F6"/>
  <line x1="380" y1="100" x2="380" y2="140" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="380" y="155" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#1D4ED8">LL(fitted model)</text>
  
  <!-- Saturated -->
  <circle cx="530" cy="100" r="7" fill="#10B981"/>
  <line x1="530" y1="100" x2="530" y2="140" stroke="#10B981" stroke-width="1.5"/>
  <text x="530" y="155" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#1F2937" fill="#059669">LL(saturated model)</text>
  <text x="530" y="170" text-anchor="middle" font-size="8" font-family="system-ui, -apple-system, sans-serif" fill="#4B5563">Perfect ceiling (0.0)</text>
  
  <!-- Bounds -->
  <text x="65" y="104" font-size="10" font-weight="bold" fill="#111827">Worst</text>
  <text x="580" y="104" font-size="10" font-weight="bold" fill="#111827">Perfect</text>
</svg>